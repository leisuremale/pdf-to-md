name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    defaults:
      run:
        working-directory: scripts
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - run: npm ci

      - name: Syntax-check JS modules
        run: |
          node --check pipeline.js
          node --check lib/cjk.js
          node --check lib/fix.js
          node --check lib/join.js
          node --check lib/convert.js

      - name: Run tests
        run: npm test

  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile-check ocr.py
        run: python -m py_compile scripts/ocr.py
